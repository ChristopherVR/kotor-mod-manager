version: 2
updates:
  # GitHub Actions used by our workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"

  # Frontend JavaScript/TypeScript dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      # Bundle minor and patch bumps so players get fewer, tidier update PRs
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Tauri / Rust dependencies (cargo)
  - package-ecosystem: "cargo"
    directory: "/frontend/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Python backend dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
