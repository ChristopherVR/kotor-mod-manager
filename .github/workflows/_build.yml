name: _build (reusable)

# Reusable workflow: builds the Python backend sidecar (PyInstaller, HoloPatcher
# bundled), then the Tauri desktop app (React + Rust) into a self-contained NSIS
# installer. Always uploads the installer as an artifact; optionally publishes a
# GitHub Release. Called by build.yml (PR/manual) and release.yml (tagged).

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ""
      make_release:
        type: boolean
        required: false
        default: false
      tag:
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # ---- Python backend sidecar ----------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend sanity check
        run: python -c "import backend.server, installer.pipeline, installer.patcher_strategy; print('backend imports OK')"

      - name: Fetch HoloPatcher shim
        run: python tools/setup_holopatcher.py

      - name: Verify HoloPatcher present
        shell: pwsh
        run: |
          if (-not (Test-Path "tools/HoloPatcher/HoloPatcher.exe")) {
            Write-Error "HoloPatcher.exe missing — sidecar would not be self-contained."; exit 1
          }

      - name: Build backend sidecar (PyInstaller)
        run: pyinstaller backend.spec --noconfirm

      - name: Stage backend for embedding into the single exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "frontend/src-tauri/binaries" | Out-Null
          Copy-Item "dist/kotor-backend.exe" "frontend/src-tauri/binaries/kotor-backend.exe" -Force
          Get-Item "frontend/src-tauri/binaries/kotor-backend.exe" | Select-Object Name, Length

      # ---- Frontend (React) + Tauri (Rust) -------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build single self-contained exe (backend embedded)
        working-directory: frontend
        run: npx tauri build

      - name: Locate + name the exe
        id: artifact
        shell: pwsh
        run: |
          $exe = "frontend/src-tauri/target/release/kotor-mod-installer.exe"
          if (-not (Test-Path $exe)) { Write-Error "Single exe not found at $exe"; exit 1 }
          $out = "KOTOR-Mod-Installer.exe"
          Copy-Item $exe $out -Force
          $f = Get-Item $out
          Write-Output "Single exe: $($f.FullName) ($([math]::Round($f.Length/1MB,1)) MB)"
          "path=$($f.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: KOTOR-Mod-Installer
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30

      - name: Publish GitHub Release
        if: inputs.make_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ steps.artifact.outputs.path }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
