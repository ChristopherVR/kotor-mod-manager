name: CI Build

# Validation builds for pull requests and manual runs. Produces a downloadable
# exe artifact but does NOT publish a release (that is release.yml's job).
# Reuses the same build definition so behaviour matches the released artifact.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      make_release: false
