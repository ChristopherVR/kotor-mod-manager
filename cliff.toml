# git-cliff configuration — https://git-cliff.org
# Generates CHANGELOG.md from Conventional Commits and computes the next semver
# (`git cliff --bumped-version`). Drives the auto version-bump release pipeline.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
This project adheres to [Semantic Versioning](https://semver.org) and
[Conventional Commits](https://www.conventionalcommits.org).\n
"""
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactor" },
    { message = "^doc", group = "<!-- 4 -->Documentation" },
    { message = "^build|^ci", group = "<!-- 5 -->Build & CI" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps\\)|^build\\(deps\\)", group = "<!-- 7 -->Dependencies" },
    { message = "^chore|^style", group = "<!-- 8 -->Miscellaneous" },
    { body = ".*security", group = "<!-- 9 -->Security" },
    { message = ".*", group = "<!-- 8 -->Miscellaneous" },
]

# Version bump rules: BREAKING CHANGE -> major, feat -> minor, otherwise patch.
[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
